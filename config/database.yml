default: &default
  adapter: postgresql
  encoding: unicode
  pool: 10
  connect_timeout: 2
  # consider lock_timeout (kill query that takes longer than N to acqure lock)
  # and statement_timeout (kill query that takes longer than N)

development:
  <<: *default
  database: steak_and_eggs_development

test:
  <<: *default
  database: steak_and_eggs_test

production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>
    
cache:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>
  database_tasks: false